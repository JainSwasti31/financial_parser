services:
  - type: web
    name: financial-document-parser-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://financial-parser-nu.vercel.app
      - key: OCR_PROVIDER
        value: tesseract
      - key: AI_PROVIDER
        value: rule_based
      - key: GEMINI_API_KEY
        sync: false
