services:
  - type: web
    name: financial-parser-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerCommand: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: financial-parser-db
          property: connectionString
      - key: DB_CONNECT_TIMEOUT_SECONDS
        value: "10"
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: FRONTEND_ORIGIN
        sync: false
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "25"
      - key: MAX_BATCH_SIZE
        value: "20"
      - key: OCR_PROVIDER
        value: gemini
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
    disk:
      name: document-uploads
      mountPath: /app/uploads
      sizeGB: 5

databases:
  - name: financial-parser-db
    databaseName: financial_parser
    user: financial_parser
