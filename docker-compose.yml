services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: financial_parser
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financial_parser"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/financial_parser
      SECRET_KEY: ${SECRET_KEY:-local-development-only-change-me}
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      FRONTEND_ORIGIN: http://127.0.0.1:5173
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE_MB: 25
      MAX_BATCH_SIZE: 20
      OCR_PROVIDER: ${OCR_PROVIDER:-gemini}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://127.0.0.1:8000/api/v1
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
